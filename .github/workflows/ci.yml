name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["main"]

jobs:
  # ─── Unit + component tests (Vitest) ───────────────────────────────────────
  unit:
    name: Unit & Component Tests (Vitest)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run Vitest
        run: npm test
        env:
          # Provide dummy env vars so modules initialise without errors in tests
          VITE_API_FOOTBALL_KEY: ci-test-key

      - name: Build production app
        run: npm run build

      - name: Generate coverage report
        run: npm run test:coverage
        env:
          VITE_API_FOOTBALL_KEY: ci-test-key

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: vitest-coverage
          path: coverage/

  # ─── Edge function tests (Deno) ────────────────────────────────────────────
  edge-functions:
    name: Edge Function Tests (Deno)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v1
        with:
          deno-version: v1.x

      - name: Test create-checkout
        run: deno test --allow-env supabase/functions/create-checkout/index.test.ts

      - name: Test stripe-webhook
        run: deno test --allow-env supabase/functions/stripe-webhook/index.test.ts

      - name: Test send-email
        run: deno test --allow-env supabase/functions/send-email/index.test.ts

  # ─── E2E tests (Playwright) — only on pre-production branch ─────────────────
  e2e:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    # Only run E2E on the pre-production branch or when manually triggered
    if: github.ref == 'refs/heads/pre-production' || github.event_name == 'workflow_dispatch'

    services:
      # Supabase local stack is not available as a GitHub Actions service;
      # E2E tests that need Supabase use environment variables pointing at
      # a dedicated staging project (set as repository secrets).
      # Tests that do NOT need Supabase (most journeys run in local-only mode)
      # work without this service.
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: npx playwright test
        env:
          VITE_SUPABASE_URL: ${{ secrets.STAGING_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.STAGING_SUPABASE_ANON_KEY }}
          E2E_TEST_EMAIL: ${{ secrets.E2E_TEST_EMAIL }}
          E2E_TEST_PASSWORD: ${{ secrets.E2E_TEST_PASSWORD }}
          CI: "true"

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
